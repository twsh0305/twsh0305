name: 更新博客文章列表

on:
  schedule:
    - cron: '0 2 * * *'   # 每天北京时间上午10点（UTC 02:00）更新
  workflow_dispatch:        # 支持手动触发

permissions:
  contents: write

jobs:
  update-readme:
    name: 更新 README 博客列表
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://wxsnote.cn/feed/"   # 你的WordPress RSS源
          max_post_count: 5                         # 显示最近5篇
          template: "- [$title]($url) · $date\n"
          date_format: "yyyy-mm-dd"
          commit_message: "自动更新博客文章列表"
          committer_username: "github-actions[bot]"
          committer_email: "github-actions[bot]@users.noreply.github.com"
